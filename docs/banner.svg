<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1230"/>
      <stop offset="0.55" stop-color="#080A1C"/>
      <stop offset="1" stop-color="#04050B"/>
    </linearGradient>
    <radialGradient id="nebula" cx="0.72" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#8AB4FF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#8AB4FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebula2" cx="0.2" cy="0.85" r="0.5">
      <stop offset="0" stop-color="#21D07A" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#21D07A" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="380" fill="url(#sky)"/>
  <rect width="1200" height="380" fill="url(#nebula)"/>
  <rect width="1200" height="380" fill="url(#nebula2)"/>

  <!-- faint background starfield -->
  <g fill="#FFFFFF">
    <circle cx="60" cy="40" r="1" opacity=".5"/><circle cx="140" cy="120" r="1.3" opacity=".6"/>
    <circle cx="210" cy="60" r="1" opacity=".4"/><circle cx="330" cy="150" r="1" opacity=".5"/>
    <circle cx="420" cy="50" r="1.4" opacity=".7"/><circle cx="500" cy="120" r="1" opacity=".4"/>
    <circle cx="620" cy="40" r="1" opacity=".5"/><circle cx="700" cy="150" r="1.2" opacity=".6"/>
    <circle cx="820" cy="60" r="1" opacity=".4"/><circle cx="930" cy="120" r="1.3" opacity=".6"/>
    <circle cx="1010" cy="50" r="1" opacity=".5"/><circle cx="1120" cy="120" r="1.2" opacity=".6"/>
    <circle cx="90" cy="230" r="1" opacity=".5"/><circle cx="250" cy="300" r="1.3" opacity=".6"/>
    <circle cx="380" cy="330" r="1" opacity=".4"/><circle cx="540" cy="300" r="1" opacity=".5"/>
    <circle cx="690" cy="330" r="1.4" opacity=".6"/><circle cx="860" cy="300" r="1" opacity=".4"/>
    <circle cx="1000" cy="330" r="1.2" opacity=".6"/><circle cx="1140" cy="300" r="1" opacity=".5"/>
    <circle cx="170" cy="200" r="1" opacity=".4"/><circle cx="1080" cy="220" r="1" opacity=".5"/>
  </g>

  <!-- constellation lines -->
  <g stroke="#8AB4FF" stroke-opacity="0.22" stroke-width="1">
    <line x1="180" y1="250" x2="300" y2="180"/>
    <line x1="300" y1="180" x2="250" y2="95"/>
    <line x1="985" y1="150" x2="1075" y2="235"/>
    <line x1="1075" y1="235" x2="980" y2="300"/>
  </g>

  <!-- coin stars -->
  <g filter="url(#glow)">
    <circle cx="300" cy="180" r="22" fill="#21D07A"/>
    <circle cx="250" cy="95"  r="9"  fill="#FFE3A3"/>
    <circle cx="180" cy="250" r="13" fill="#8FB8FF"/>
    <circle cx="985" cy="150" r="17" fill="#FF5C6C"/>
    <circle cx="1075" cy="235" r="8" fill="#8FB8FF"/>
    <circle cx="980" cy="300" r="11" fill="#21D07A"/>
    <circle cx="150" cy="150" r="6"  fill="#FFE3A3"/>
  </g>
  <g fill="#FFFFFF" opacity="0.92">
    <circle cx="300" cy="180" r="7"/><circle cx="985" cy="150" r="5"/><circle cx="180" cy="250" r="4"/>
  </g>
  <g fill="#C9D4F2" font-size="13" font-weight="600" text-anchor="middle">
    <text x="300" y="222">BTC</text>
    <text x="985" y="186">ETH</text>
  </g>

  <!-- shooting star -->
  <g stroke-linecap="round">
    <line x1="760" y1="70" x2="860" y2="120" stroke="#FFE3A3" stroke-width="2" opacity="0.8"/>
    <circle cx="860" cy="120" r="2.5" fill="#FFFFFF"/>
  </g>

  <!-- title -->
  <text x="600" y="300" text-anchor="middle" fill="#E7ECFF" font-size="58" font-weight="800" letter-spacing="0.5">Coinstellations</text>
  <text x="600" y="338" text-anchor="middle" fill="#8A93B8" font-size="20" font-weight="500">the crypto market as a living night sky · Compose Multiplatform · CoinStats API</text>
</svg>
